<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="icon" type="image/png" href="ArabCaptcha.png">

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <section class="card">
      <h1 class="title">Login</h1>

      <form id="loginForm" class="form" novalidate>
        <label class="field">
          <span class="label">Email</span>
          <input id="email" type="email" placeholder="username@gmail.com" required />
          <small class="hint" id="emailHint"></small>
        </label>

        <label class="field">
          <span class="label">Password</span>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="Password" required />
            <button class="icon-btn" type="button" id="togglePwd" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z" stroke="currentColor" stroke-width="2" />
                <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="2" />
              </svg>
            </button>
          </div>
          <small class="hint" id="pwdHint"></small>
        </label>

        <div class="row">
          <a class="link" href="#" onclick="return false;">Forgot Password?</a>
        </div>

        <button class="primary" type="submit">Sign in</button>

        <!-- Login status message -->
        <div class="login-status" id="loginStatus" role="status" aria-live="polite"></div>

        <p class="footer">
          Don't have an account yet?
          <a class="link strong" href="#" onclick="return false;">Register for free</a>
        </p>
      </form>
    </section>
  </main>

  <!-- CAPTCHA MODAL OVERLAY -->
  <div class="modal-overlay hidden" id="captchaModal">
    <div class="modal-content captcha">
      <button type="button" class="modal-close" id="modalCloseBtn" aria-label="Close">&times;</button>

      <div class="cap-head">
        <div class="cap-words">
          <img class="cap-word-img" id="captchaWord1" alt="Loading..." style="height: 40px; margin: 0 5px;" />
          <img class="cap-word-img" id="captchaWord2" alt="Loading..." style="height: 40px; margin: 0 5px;" />
        </div>

        <button class="icon-btn refresh-icon-btn" type="button" id="refreshCaptcha" aria-label="Refresh captcha">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M21 3v7h-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <div class="cap-sub">اكتب الكلمات العربية الظاهرة</div>

      <div class="cap-input-row">
        <input id="captchaInput" type="text" placeholder="اكتب النص أعلاه" autocomplete="off" dir="rtl" />
        <button class="secondary" type="button" id="verifyCaptchaBtn">تحقق</button>
      </div>

      <div class="cap-status" id="captchaStatus" role="status" aria-live="polite"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
