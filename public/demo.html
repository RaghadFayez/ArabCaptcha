<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArabCaptcha — Demo</title>
    <style>
        :root {
            --bg: #f2efe9;
            --card: rgba(255, 255, 255, 0.82);
            --stroke: rgba(0, 0, 0, 0.09);
            --text: #2a2a2a;
            --muted: rgba(0, 0, 0, 0.50);
            --btn: #6b5f52;
            --btn-hover: #5a5046;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.13);
            --radius: 18px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .wrapper {
            width: min(420px, 92vw);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── Logo row ── */
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 4px;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            background: var(--btn);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
        }

        .brand h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
        }

        .live-badge {
            background: rgba(107, 95, 82, 0.12);
            color: var(--btn);
            border: 1px solid rgba(107, 95, 82, 0.25);
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 0.72rem;
            font-weight: 700;
        }

        /* ── Demo card ── */
        .card {
            background: var(--card);
            border: 1px solid var(--stroke);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 22px 18px;
        }

        .card-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 600;
            margin-bottom: 14px;
        }

        /* ── Captcha frame — grows with content ── */
        .captcha-frame {
            width: 100%;
            border: none;
            border-radius: 12px;
            display: block;
            /* Start at collapsed height; JS will expand it */
            height: 68px;
            transition: height 0.25s ease;
            background: transparent;
        }

        /* ── Snippet box ── */
        .snippet-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .snippet {
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid var(--stroke);
            border-radius: 12px;
            padding: 12px 14px;
            font-family: 'Courier New', monospace;
            font-size: 0.72rem;
            color: var(--btn);
            line-height: 1.6;
            word-break: break-all;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(107, 95, 82, 0.10);
            border: 1px solid rgba(107, 95, 82, 0.20);
            color: var(--btn);
            border-radius: 8px;
            padding: 2px 9px;
            font-size: 0.68rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: background 0.15s;
        }

        .copy-btn:hover {
            background: rgba(107, 95, 82, 0.18);
        }

        /* ── Features ── */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .feat {
            background: var(--card);
            border: 1px solid var(--stroke);
            border-radius: 14px;
            padding: 12px 8px;
            text-align: center;
        }

        .feat-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .feat-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text);
        }

        .feat-sub {
            font-size: 0.67rem;
            color: var(--muted);
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div class="wrapper">

        <div class="brand">
            <div class="brand-logo">🔐</div>
            <h1>ArabCaptcha</h1>
            <span class="live-badge">Live Demo</span>
        </div>

        <div class="card">
            <div class="card-label">🧪 جرّب الكابتشا مباشرة</div>
            <iframe id="captchaFrame" class="captcha-frame"
                src="/public/widget.html?domain=https://arabcaptcha.onrender.com&site_key=demo" scrolling="no"
                allowtransparency="true"></iframe>
        </div>

        <div class="card">
            <div class="snippet-label">📦 أضف الكابتشا لأي موقع بسطر واحد:</div>
            <div class="snippet">
                <button class="copy-btn" onclick="copySnippet()">نسخ</button>
                &lt;script src="https://arabcaptcha.onrender.com/public/arabcaptcha.js"&gt;&lt;/script&gt;
            </div>
        </div>

        <div class="features">
            <div class="feat">
                <div class="feat-icon">🤖</div>
                <div class="feat-title">كشف البوت</div>
                <div class="feat-sub">تحليل سلوكي فوري</div>
            </div>
            <div class="feat">
                <div class="feat-icon">🌍</div>
                <div class="feat-title">عربي أصيل</div>
                <div class="feat-sub">ألغاز بالخط العربي</div>
            </div>
            <div class="feat">
                <div class="feat-icon">⚡</div>
                <div class="feat-title">API مفتوحة</div>
                <div class="feat-sub">قابلة للدمج بأي موقع</div>
            </div>
        </div>

    </div>

    <script>
        const frame = document.getElementById('captchaFrame');

        // Expand iframe when widget opens challenge (page 2 is taller)
        window.addEventListener('message', (e) => {
            if (!e.data) return;
            // arabcaptcha resize event
            if (e.data.type === 'arabcaptcha:resize' && e.data.height) {
                frame.style.height = e.data.height + 'px';
            }
            // fallback: any positive height number sent from widget
            if (typeof e.data === 'number' && e.data > 50) {
                frame.style.height = e.data + 'px';
            }
        });

        // Fallback: poll iframe content height every 400ms
        setInterval(() => {
            try {
                const h = frame.contentDocument?.documentElement?.scrollHeight;
                if (h && h > 60) frame.style.height = h + 'px';
            } catch (_) { /* cross-origin — ignore */ }
        }, 400);

        function copySnippet() {
            navigator.clipboard.writeText('<script src="https://arabcaptcha.onrender.com/public/arabcaptcha.js"><\/script>');
            const btn = document.querySelector('.copy-btn');
            btn.textContent = '✅ تم';
            setTimeout(() => btn.textContent = 'نسخ', 2000);
        }
    </script>
</body>

</html>
