<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArabCaptcha Widget</title>
  <link rel="stylesheet" href="widget.css" />
</head>

<body>
  <main class="widget-shell">
    <div class="captcha">
      <div class="cap-page cap-page-1" id="capPage1">
        <div class="cap-line">
          <button type="button" class="cap-circle" id="capStartBtn" aria-label="Start captcha"></button>
          <span class="cap-text">التحقق البشري</span>
        </div>
      </div>

      <div class="cap-page cap-page-2 hidden" id="capPage2">
        <div class="cap-head">
          <div class="cap-images">
            <div class="cap-image-box">
              <img id="refImage" alt="صورة الكلمة المرجعية" />
            </div>

            <div class="cap-image-box">
              <img id="lowConfImage" alt="الكلمة غير الواضحة" />
            </div>
          </div>

          <button class="icon-btn refresh-inline" type="button" id="refreshCaptcha" aria-label="Refresh captcha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path d="M21 3v7h-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <div class="cap-sub">اكتب الكلمات الظاهرة في الصورتين:</div>

        <div class="cap-fields">
          <input id="refAnswer" type="text" placeholder="اكتب الكلمة المرجعية" autocomplete="off" />
          <input id="lowConfAnswer" type="text" placeholder="اكتب الكلمة الثانية" autocomplete="off" />
        </div>

        <div class="cap-actions">
          <button class="secondary" type="button" id="verifyCaptchaBtn">تحقق</button>
        </div>

        <div class="cap-status" id="captchaStatus" role="status" aria-live="polite"></div>
      </div>
    </div>

    <!-- لوحة عرض للمطور لغرض التجربة أثناء العرض التقديمي -->
    <div class="cap-debug"
      style="margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.03); border: 1px dashed #999; border-radius: 8px; font-family: sans-serif; direction: rtl; text-align: right;">
      <h4 style="margin: 0 0 8px 0; color: #333;">🕵️ أدوات المطور (للشرح والتجربة)</h4>
      <div style="font-size: 13px; margin-bottom: 10px;">
        <strong>درجة البوت الآلي: </strong> <span id="debugScore" style="color:#b03a2e; font-weight:bold;">0</span> /
        100 <br>
        <strong>مستوى الصعوبة الحالي: </strong> <span id="debugDiff" style="color:#b03a2e; font-weight:bold;">عادي
          (Easy)</span>
      </div>
      <button
        style="border: 1px solid #0056b3; background: transparent; color: #0056b3; cursor: pointer; padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold;"
        type="button" id="debugBotBtn">
        🤖 محاكاة سلوك البوت (تحدي صعب)
      </button>
    </div>
  </main>

  <script src="widget.js"></script>
</body>

</html>
