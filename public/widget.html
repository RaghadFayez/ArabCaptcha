<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArabCaptcha Widget</title>
  <link rel="stylesheet" href="widget.css?v=1.2" />
</head>

<body>
  <main class="widget-shell">
    <div class="captcha">
      <div class="cap-page cap-page-1" id="capPage1">
        <div class="cap-line">
          <button type="button" class="cap-circle" id="capStartBtn" aria-label="Start captcha"></button>
          <span class="cap-text">التحقق البشري</span>
        </div>
      </div>

      <div class="cap-page cap-page-2 hidden" id="capPage2">
        <div class="cap-head">
          <div class="cap-images">
            <div class="cap-image-box">
              <img id="refImage" alt="صورة الكلمة المرجعية" />
            </div>

            <div class="cap-image-box">
              <img id="lowConfImage" alt="الكلمة غير الواضحة" />
            </div>
          </div>

          <button class="icon-btn refresh-inline" type="button" id="refreshCaptcha" aria-label="Refresh captcha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              <path d="M21 3v7h-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>

        <div class="cap-sub">اكتب الكلمات الظاهرة في الصورتين:</div>

        <div class="cap-fields">
          <input id="refAnswer" type="text" placeholder="اكتب الكلمة المرجعية" autocomplete="off" />
          <input id="lowConfAnswer" type="text" placeholder="اكتب الكلمة الثانية" autocomplete="off" />
        </div>

        <div class="cap-actions">
          <button class="secondary" type="button" id="verifyCaptchaBtn">تحقق</button>
        </div>

        <div class="cap-status" id="captchaStatus" role="status" aria-live="polite"></div>
      </div>
    </div>

    <!-- نهاية الودجت -->
  </main>

  <script src="widget.js?v=1.2"></script>
</body>

</html>
